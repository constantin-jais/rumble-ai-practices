# Axe bias_fairness — biais de représentation des visuels générés (import prototype).
# Cadre : aucune image générée par IA n'est neutre (tout output = un échantillonnage).
# Interaction media_review ; la V/F est l'interaction, l'axe fin est dans risks[] (phase B = UI).
# status: draft — relecture humaine + bias_review média requis avant publication (ADR 0004/0008).

- id: q-biasvisual-001
  version: 1
  status: draft
  locale: fr-FR
  title: "Biais de représentation : « un homme africain »"
  axis: bias_fairness
  difficulty: intermediate
  intent: "Repérer le biais de représentation d'un visuel généré ; aucune image générée n'est neutre."
  context:
    role: observateur
    scenario: "Image générée par IA à partir d'un prompt comme « un homme africain ». Média synthétique (voir fiche média)."
  prompt: "« Rien dans cette image ne pose de problème de représentation. » — vrai ou faux ?"
  interaction:
    type: media_review
    min_choices: 1
    max_choices: 1
  choices:
    - id: faux
      label: "Faux"
      score: 1.0
      feedback: "Elle réduit un homme africain au village, à la hutte et au pagne, torse nu : un exotisme rural qui efface l'Afrique urbaine et contemporaine. « Rien de problématique » est le piège. Biais dominant : Origine / ethnie."
    - id: vrai
      label: "Vrai"
      score: -1.0
      severity: high
      feedback: "C'est le piège : aucune image générée n'est neutre. Ici le biais dominant est : Origine / ethnie."
  expected_reasoning:
    - "Un visuel « neutre » en apparence peut porter un stéréotype."
    - "Tout output génératif est un échantillonnage, donc un biais."
  risks:
    - bias_origine
    - bias_echantillonnage
  media:
    - rumble_asset_0244.webp
  review:
    author: import-prototype
    reviewers: []
    last_reviewed_at: null
    confidence: low
    notes: "Import brouillon du prototype (bias-visual bv_001). Relecture humaine + bias_review média requis."

